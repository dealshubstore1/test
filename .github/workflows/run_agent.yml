name: Run Agent

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pytz beautifulsoup4

      - name: Run Agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python agent.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # 1. Download the absolute latest version of your repo first
          git pull origin main --rebase
          
          # 2. Add the new files created by the script
          git add log.txt score.txt || true
          
          # 3. Commit with a NEW message so we know it worked
          git commit -m "Auto-update logs" || echo "No changes to commit"
          
          # 4. Push safely to GitHub
          git push origin main

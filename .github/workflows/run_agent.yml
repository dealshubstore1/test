name: Run Cricket Score Agent

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to see the full history for rebasing

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pytz beautifulsoup4

      - name: Run Agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python agent.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Add the files
          git add log.txt score.txt || exit 0
          
          # Force the runner to synchronize with your latest web edits
          git fetch origin main
          git pull --rebase origin main
          
          # Commit only if there is actually new data
          git commit -m "Update live score: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          
          # Push the merged result
          git push origin main

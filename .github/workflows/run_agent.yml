name: Run Cricket Score Agent

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pytz beautifulsoup4

      - name: Run Agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python agent.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Add the new log files
          git add log.txt score.txt || exit 0
          
          # 1. Fetch the latest from remote
          git fetch origin main
          
          # 2. Rebase our local changes (the new logs) on top of the remote main
          git rebase origin/main
          
          # 3. Commit (if there are changes)
          git commit -m "Update score: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          
          # 4. Push back to main
          git push origin main
